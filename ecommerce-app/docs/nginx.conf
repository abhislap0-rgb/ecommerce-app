# Nginx configuration for EC2 (no domain - uses ALB URL)
# File: /etc/nginx/sites-available/ecommerce

server {
    listen 80;
    server_name _;  # accepts any hostname (ALB URL)

    # Security headers (since no HTTPS)
    add_header X-Frame-Options "DENY";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "no-referrer";

    # Forward all requests to Node.js app on port 3000
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
    }

    # Health check endpoint for ALB
    location /health {
        proxy_pass http://localhost:3000/health;
    }

    # Serve static files directly (faster)
    location /public {
        root /var/www/ecommerce;
        expires 30d;
    }
}
